; Flight Radar — clean-room ADS-B desk radar firmware
; Target: LilyGO T-Encoder Pro (ESP32-S3R8, 16MB flash QIO, 8MB OPI PSRAM,
;         1.2" round 390x390 AMOLED on QSPI, rotary encoder)
;
; Uses the community pioarduino platform for Arduino core 3.2.x (IDF 5.4) —
; required by Arduino_GFX >= 1.6. Display/touch via upstream Arduino_GFX (BSD)
; + SensorLib (MIT); no GPL LilyGO code.

[env:tencoder-pro]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DCORE_DEBUG_LEVEL=2
    -Iinclude
lib_deps =
    moononournation/GFX Library for Arduino@^1.6.1
    lvgl/lvgl@^9.2.2
    bblanchon/ArduinoJson@^7.2.1
    tzapu/WiFiManager@^2.0.17
    lewisxhe/SensorLib@^0.2.4
    bitbank2/PNGdec@^1.1.4

; Southwest-only flavor: identical firmware with the airline filter baked in
; as the default (still changeable on the web page / cleared by factory
; reset back to SWA-only). Build: pio run -e tencoder-pro-swa
[env:tencoder-pro-swa]
extends = env:tencoder-pro
build_flags =
    ${env:tencoder-pro.build_flags}
    -DDEFAULT_CALLSIGN_FILTER='"SWA"'
    -DDEVICE_HOSTNAME='"gambit-southwest-flight-radar"'
    -DSWA_THEME
